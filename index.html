<script>
    let allDeals = [];

    function handleLogin(event) {
        event.preventDefault();
        const code = document.getElementById('accessCode').value.trim();
        
        console.log('Código ingresado: "' + code + '"');
        alert('Código ingresado: "' + code + '"\n\nEsperando validación...');
        
        // Validación simple
        if (code === 'KASSAS2024' || code === 'demo123') {
            alert('✓ ¡Acceso concedido!');
            localStorage.setItem('kassas_token', 'token_' + Date.now());
            localStorage.setItem('kassas_login', 'true');
            
            // Cambiar pantalla
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            
            // Cargar datos
            loadDeals();
            startAutoSync();
        } else {
            alert('✗ Código inválido\n\nCódigos válidos:\n- KASSAS2024\n- demo123');
            showError('Código de acceso inválido');
        }
    }

    function showError(message) {
        const errorDiv = document.getElementById('loginError');
        errorDiv.textContent = '❌ ' + message;
        errorDiv.classList.add('show');
        setTimeout(() => errorDiv.classList.remove('show'), 4000);
    }

    function logout() {
        localStorage.removeItem('kassas_token');
        localStorage.removeItem('kassas_login');
        location.reload();
    }

    function generateSampleDeals() {
        return [
            {
                id: 1,
                address: "1247 Maple Street",
                city: "Miami",
                county: "Miami-Dade",
                bedrooms: 3,
                bathrooms: 2,
                sqft: 1850,
                askingPrice: 95000,
                arv: 250000,
                rehab: 40000,
                dealScore: 92,
                roi: 121,
                profit: 115000,
                spread: 115000,
                condition: "distressed",
                propertyType: "Single Family"
            },
            {
                id: 2,
                address: "542 Oak Avenue",
                city: "Tampa",
                county: "Hillsborough",
                bedrooms: 4,
                bathrooms: 2.5,
                sqft: 2200,
                askingPrice: 145000,
                arv: 310000,
                rehab: 55000,
                dealScore: 78,
                roi: 54,
                profit: 110000,
                spread: 71500,
                condition: "vacant",
                propertyType: "Single Family"
            }
        ];
    }

    function loadDeals() {
        allDeals = generateSampleDeals();
        applyFilters();
        updateStats();
    }

    function applyFilters() {
        const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
        const county = document.getElementById('countyFilter').value;
        const sort = document.getElementById('sortFilter').value;

        let filtered = allDeals.filter(d => {
            if (d.dealScore < minScore) return false;
            if (county && d.county !== county) return false;
            return true;
        });

        if (sort === 'score-desc') {
            filtered.sort((a, b) => b.dealScore - a.dealScore);
        } else if (sort === 'roi-desc') {
            filtered.sort((a, b) => b.roi - a.roi);
        } else if (sort === 'profit-desc') {
            filtered.sort((a, b) => b.profit - a.profit);
        }

        renderDeals(filtered);
    }

    function renderDeals(deals) {
        const container = document.getElementById('dealsContainer');

        if (deals.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No hay deals que cumplan los filtros</p></div>';
            return;
        }

        container.innerHTML = deals.map(deal => `
            <div class="deal-card" onclick="viewDetails(${deal.id})">
                <div class="deal-header">
                    <div class="deal-title">
                        <div class="deal-address">${deal.address}</div>
                        <div class="deal-city">${deal.city}, ${deal.county} • ${deal.bedrooms}bed/${deal.bathrooms}ba</div>
                    </div>
                    <div class="score-badge">
                        <div class="score-number">${deal.dealScore}</div>
                        <div class="score-label">SCORE</div>
                    </div>
                </div>
                <div class="deal-body">
                    <div class="metric">
                        <div class="metric-label">Precio</div>
                        <div class="metric-value">$${deal.askingPrice.toLocaleString()}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">ARV</div>
                        <div class="metric-value">$${deal.arv.toLocaleString()}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Ganancia</div>
                        <div class="metric-value">$${deal.profit.toLocaleString()}</div>
                        <div class="metric-sub">${deal.roi}% ROI</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Rehab</div>
                        <div class="metric-value">$${deal.rehab.toLocaleString()}</div>
                    </div>
                </div>
                <div class="deal-footer">
                    <div class="action-buttons">
                        <button class="btn-small btn-info" onclick="event.stopPropagation(); viewDetails(${deal.id})">Ver Detalles</button>
                        <button class="btn-small btn-action" onclick="event.stopPropagation(); generateOffer()">Oferta</button>
                    </div>
                    <div class="tags">
                        ${deal.condition === 'distressed' ? '<span class="tag tag-distressed">⚠️ Distressed</span>' : ''}
                        <span class="tag tag-florida">🏖️ FL</span>
                        <span class="tag tag-hot">🔥 Top</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        const avgScore = allDeals.length > 0 ? Math.round(allDeals.reduce((s, d) => s + d.dealScore, 0) / allDeals.length) : 0;
        const totalProfit = allDeals.reduce((s, d) => s + d.profit, 0);
        const topScore = allDeals.length > 0 ? Math.max(...allDeals.map(d => d.dealScore)) : 0;

        document.getElementById('totalDeals').textContent = allDeals.length;
        document.getElementById('avgScore').textContent = avgScore;
        document.getElementById('totalProfit').textContent = `$${(totalProfit / 1000).toFixed(0)}K`;
        document.getElementById('topScore').textContent = topScore;
    }

    function viewDetails(dealId) {
        const deal = allDeals.find(d => d.id === dealId);
        if (!deal) return;

        document.getElementById('modalAddress').textContent = deal.address;
        document.getElementById('modalCity').textContent = `${deal.city}, ${deal.county}, FL`;
        document.getElementById('modalScore').textContent = `${deal.dealScore}/100`;
        document.getElementById('modalPrice').textContent = `$${deal.askingPrice.toLocaleString()}`;
        document.getElementById('modalARV').textContent = `$${deal.arv.toLocaleString()}`;
        document.getElementById('modalRehab').textContent = `$${deal.rehab.toLocaleString()}`;
        document.getElementById('modalProfit').textContent = `$${deal.profit.toLocaleString()}`;
        document.getElementById('modalROI').textContent = `${deal.roi}%`;
        document.getElementById('modalSpread').textContent = `$${deal.spread.toLocaleString()}`;
        document.getElementById('modalType').textContent = deal.propertyType;
        document.getElementById('modalSqft').textContent = `${deal.sqft.toLocaleString()} sqft`;
        document.getElementById('modalBeds').textContent = `${deal.bedrooms}bed / ${deal.bathrooms}ba`;
        document.getElementById('modalCondition').textContent = deal.condition;

        openModal('detailsModal');
    }

    function generateOffer() {
        alert('📄 Generar oferta\n\n(Función en desarrollo)');
    }

    function contactSeller() {
        alert('📧 Contactar vendedor\n\n(Función en desarrollo)');
    }

    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    async function syncDeals() {
        const btn = document.getElementById('syncBtn');
        btn.classList.add('syncing');
        btn.textContent = '⏳ Sincronizando...';

        try {
            allDeals = generateSampleDeals();
            await new Promise(r => setTimeout(r, 2000));
            
            applyFilters();
            updateStats();
            alert('✓ Deals sincronizados correctamente');
        } catch (error) {
            showError('Error sincronizando deals');
        } finally {
            btn.classList.remove('syncing');
            btn.textContent = '🔄 Sincronizar Deals';
        }
    }

    function startAutoSync() {
        setInterval(syncDeals, 5 * 60 * 1000);
    }

    function checkAuth() {
        const isLoggedIn = localStorage.getItem('kassas_login') === 'true';
        if (isLoggedIn) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            loadDeals();
            startAutoSync();
        }
    }

    // Inicializar cuando cargue la página
    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
    });

    // Cerrar modal al hacer click afuera
    window.onclick = function(event) {
        const modal = document.getElementById('detailsModal');
        if (event.target === modal) {
            closeModal('detailsModal');
        }
    };
</script>
